services:
  db:
    image: postgres:16-alpine
    container_name: banking-db
    environment:
      POSTGRES_DB: banking
      POSTGRES_USER: banking
      POSTGRES_PASSWORD: banking
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U banking -d banking"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: banking-app
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: banking
      DB_USER: banking
      DB_PASS: banking
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
